<mat-card class="header-card-global">
    <mat-card-header>
        <mat-card-title>
            <mat-icon>people</mat-icon>
            Catálogo de Clientes
        </mat-card-title>
    </mat-card-header>
</mat-card>

<div class="container">

    <mat-card class="form-card">
        <mat-card-header>
            <mat-card-title>{{ isEditing ? 'Editar Cliente' : 'Nuevo Cliente' }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <div class="form-row">
                <mat-form-field appearance="outline">
                    <mat-label>Nombre</mat-label>
                    <input matInput [(ngModel)]="newClient.name">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Teléfono</mat-label>
                    <input matInput [(ngModel)]="newClient.phone">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Dirección</mat-label>
                    <input matInput [(ngModel)]="newClient.address">
                </mat-form-field>

                <div class="button-group">
                    <button mat-raised-button color="primary" (click)="saveClient()" [disabled]="!newClient.name">
                        {{ isEditing ? 'Actualizar' : 'Agregar' }}
                    </button>
                    <button mat-button *ngIf="isEditing" (click)="cancelEdit()">
                        Cancelar
                    </button>
                </div>

                <div class="spacer"></div>

                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Buscar cliente</mat-label>
                    <input matInput [(ngModel)]="searchTerm" placeholder="Nombre...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>
        </mat-card-content>
    </mat-card>

    <mat-card class="table-card">
        <div class="table-container">
            <table mat-table [dataSource]="filteredClients" class="mat-elevation-z0">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> ID </th>
                    <td mat-cell *matCellDef="let client"> {{client.id}} </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Nombre </th>
                    <td mat-cell *matCellDef="let client"> {{client.name}} </td>
                </ng-container>

                <ng-container matColumnDef="phone">
                    <th mat-header-cell *matHeaderCellDef> Teléfono </th>
                    <td mat-cell *matCellDef="let client"> {{client.phone}} </td>
                </ng-container>

                <ng-container matColumnDef="address">
                    <th mat-header-cell *matHeaderCellDef> Dirección </th>
                    <td mat-cell *matCellDef="let client"> {{client.address}} </td>
                </ng-container>

                <ng-container matColumnDef="pending_balance">
                    <th mat-header-cell *matHeaderCellDef> Saldo Pendiente </th>
                    <td mat-cell *matCellDef="let client" class="balance-cell"
                        [class.has-balance]="client.pending_balance > 0" (click)="openPendingSalesDialog(client)">
                        {{client.pending_balance | currency}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> Acciones </th>
                    <td mat-cell *matCellDef="let client">
                        <div class="action-buttons">
                            <button mat-icon-button color="primary" (click)="editClient(client)">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteClient(client)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </mat-card>
</div>
