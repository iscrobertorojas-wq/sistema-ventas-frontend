<mat-card class="header-card-global">
    <mat-card-header>
        <mat-card-title>
            <mat-icon>build</mat-icon>
            Catálogo de Servicios
        </mat-card-title>
    </mat-card-header>
</mat-card>

<div class="container">

    <mat-card class="form-card">
        <mat-card-header>
            <mat-card-title>Nuevo Servicio</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <div class="form-row">
                <mat-form-field appearance="outline">
                    <mat-label>Descripción</mat-label>
                    <input matInput [(ngModel)]="newService.description">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Precio</mat-label>
                    <input matInput type="number" [(ngModel)]="newService.price">
                </mat-form-field>

                <button mat-raised-button color="primary" (click)="addService()" [disabled]="!newService.description">
                    Agregar
                </button>
            </div>
        </mat-card-content>
    </mat-card>

    <mat-card class="table-card">
        <div class="table-container">
            <table mat-table [dataSource]="services" class="mat-elevation-z0">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> ID </th>
                    <td mat-cell *matCellDef="let service"> {{service.id}} </td>
                </ng-container>

                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Descripción </th>
                    <td mat-cell *matCellDef="let service"> {{service.description}} </td>
                </ng-container>

                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef> Precio </th>
                    <td mat-cell *matCellDef="let service"> {{service.price | currency}} </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> Acciones </th>
                    <td mat-cell *matCellDef="let service">
                        <button mat-icon-button>
                            <mat-icon>edit</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </mat-card>
</div>
